name: Deploy Container App

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to push and deploy
        required: false
        default: phase9
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-containerapp.yml

permissions:
  contents: read
  id-token: write

env:
  RESOURCE_GROUP: rg-ai-doc-intel-dev
  ACR_NAME: acidocintel30929
  ACR_LOGIN_SERVER: acidocintel30929.azurecr.io
  IMAGE_NAME: ai-doc-intel-backend
  CONTAINER_APP_NAME: aca-ai-doc-intel-api-dev

jobs:
  deploy:
    name: Build, push and update image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${GITHUB_SHA::12}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "image=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${TAG}" >> "${GITHUB_OUTPUT}"

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build Docker image
        run: docker build -t "${{ steps.image.outputs.image }}" ./backend

      - name: Push Docker image
        run: docker push "${{ steps.image.outputs.image }}"

      - name: Update Container App image only
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ steps.image.outputs.image }}" \
            --only-show-errors

      - name: Validate health endpoints
        shell: bash
        run: |
          FQDN="$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn \
            -o tsv \
            --only-show-errors)"
          curl --fail --retry 12 --retry-delay 10 --retry-all-errors "https://${FQDN}/health"
          curl --fail --retry 12 --retry-delay 10 --retry-all-errors "https://${FQDN}/ready"
